test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# AWS credentials are read from the environment by aws-sdk-s3 itself
# (AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY). Locally: export them in
# your shell before bin/dev. On Heroku: heroku config:set AWS_ACCESS_KEY_ID=...
amazon:
  service: S3
  region: us-east-1
  bucket: landscape-guessr-uploads-prod

# Remember not to checkin your GCS keyfile to a repository
