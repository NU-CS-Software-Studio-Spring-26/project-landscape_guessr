<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Bad request (400) - Landscape Guessr</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      font-family: "DM Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #f3f8f4;
      color: #163a24;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(680px, 100%);
      background: #fff;
      border: 1px solid #c4d9c8;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(14, 36, 23, 0.08);
      padding: 28px;
      text-align: center;
    }
    .eyebrow { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: #3a7a52; font-weight: 700; }
    h1 { font-family: "Fraunces", Georgia, serif; font-size: clamp(28px, 4vw, 40px); margin-top: 8px; }
    p { margin-top: 12px; color: #2a6642; line-height: 1.6; }
    .code {
      display: inline-block;
      margin-top: 18px;
      font-weight: 800;
      color: #1f5234;
      background: #e3eee5;
      border: 1px solid #c4d9c8;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 20px;
    }
    .actions { margin-top: 22px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      border-radius: 10px;
      padding: 10px 14px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
    .btn-primary { background: #2a6642; color: #fff; }
    .btn-secondary { background: #fff; color: #1f5234; border: 1px solid #c4d9c8; }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Landscape Guessr</div>
    <h1>Bad request</h1>
    <div class="code">Error 400</div>
    <p>The request could not be processed. Please refresh and try again.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Go home</a>
      <a class="btn btn-secondary" href="/practice">Open practice mode</a>
    </div>
  </main>
</body>
</html>
